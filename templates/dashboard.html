    <!-- Modern Toast Notification Styles -->
    <style>
        /* --- PREMIUM TOAST NOTIFICATION --- */
        #toast-container {
            position: fixed;
            top: 20px;
            right: 20px;
            z-index: 10000;
            display: flex;
            flex-direction: column;
            gap: 10px;
            pointer-events: none;
        }

        .toast-msg {
            min-width: 250px;
            background: #1e293b;
            color: white;
            padding: 14px 20px;
            border-radius: 10px;
            box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.5);
            border-left: 5px solid #3b82f6;
            display: flex;
            align-items: center;
            gap: 12px;
            pointer-events: auto;
            animation: toast-slide-in 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards;
            font-size: 14px;
            font-weight: 500;
        }

        .toast-msg.success {
            border-left-color: #10b981;
        }

        .toast-msg.error {
            border-left-color: #ef4444;
        }

        .toast-msg.warning {
            border-left-color: #f59e0b;
        }

        .toast-msg.info {
            border-left-color: #3b82f6;
        }

        @keyframes toast-slide-in {
            from {
                transform: translateX(120%);
                opacity: 0;
            }

            to {
                transform: translateX(0);
                opacity: 1;
            }
        }

        .toast-fade-out {
            animation: toast-fade-out 0.4s ease-in forwards !important;
        }

        @keyframes toast-fade-out {
            from {
                transform: translateX(0);
                opacity: 1;
            }

            to {
                transform: translateX(40px);
                opacity: 0;
            }
        }

        /* --- BILLING GUARD BAR --- */
        .billing-guard-bar {
            margin-bottom: 12px;
            padding: 10px 16px;
            background: rgba(30, 41, 59, 0.5);
            border: 1px solid rgba(59, 130, 246, 0.2);
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 10px;
            backdrop-filter: blur(4px);
        }

        .billing-guard-btn {
            padding: 6px 14px;
            height: 32px;
            border-radius: 8px;
            font-size: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
            border: 1px solid rgba(59, 130, 246, 0.4);
            box-shadow: 0 4px 10px rgba(59, 130, 246, 0.15);
            transition: all 0.2s;
            background: linear-gradient(135deg, #3b82f6 0%, #2563eb 100%);
            color: white;
            font-weight: 800;
            white-space: nowrap;
            width: auto;
            cursor: pointer;
        }

        @media (max-width: 768px) {
            .billing-guard-bar {
                flex-direction: column;
                align-items: stretch;
                padding: 12px;
            }

            .billing-guard-btn {
                width: 100% !important;
                margin-top: 8px;
            }
        }

        /* --- DASHBOARD NEWS MARQUEE --- */
        .news-marquee-container {
            flex: 1;
            margin-left: 20px;
            margin-right: 20px;
            background: rgba(15, 23, 42, 0.4);
            border: 1px solid rgba(59, 130, 246, 0.15);
            border-radius: 12px;
            height: 36px;
            display: none;
            /* Hidden by default until content loads */
            align-items: center;
            overflow: hidden;
            position: relative;
            backdrop-filter: blur(8px);
            max-width: 700px;
        }

        .news-marquee-label {
            background: linear-gradient(135deg, #3b82f6 0%, #2563eb 100%);
            color: white;
            padding: 0 12px;
            height: 100%;
            display: flex;
            align-items: center;
            font-size: 11px;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            z-index: 2;
            box-shadow: 4px 0 15px rgba(0, 0, 0, 0.3);
            white-space: nowrap;
        }

        .news-marquee-content {
            white-space: nowrap;
            display: inline-block;
            padding-left: 100%;
            animation: marquee-scroll 30s linear infinite;
            color: #e2e8f0;
            font-size: 13px;
            font-weight: 500;
        }

        .news-marquee-content:hover {
            animation-play-state: paused;
        }

        @keyframes marquee-scroll {
            0% {
                transform: translateX(0);
            }

            100% {
                transform: translateX(-100%);
            }
        }

        @media (max-width: 1100px) {
            .news-marquee-container {
                display: none !important;
                /* Hide desktop marquee on smaller screens */
            }
        }

        /* --- MOBILE SPECIFIC LAYOUT --- */
        @media (max-width: 768px) {
            .flex-between-center.mb-20 {
                flex-direction: column !important;
                align-items: flex-start !important;
                gap: 12px;
                height: auto !important;
            }

            .flex-between-center.mb-20 > div:first-child {
                flex-direction: column !important;
                align-items: flex-start !important;
                width: 100%;
                gap: 10px !important;
            }

            .dash-clock {
                margin: 0 !important;
                width: 100% !important;
                background: rgba(30, 41, 59, 0.6) !important;
                border: 1px solid rgba(59, 130, 246, 0.2) !important;
                justify-content: center !important;
                height: 32px !important;
            }

            .mobile-news-wrapper {
                width: 100% !important;
                display: none;
            }

            .news-marquee-container.mobile-mode {
                display: flex !important;
                margin: 0 !important;
                width: 100% !important;
                height: 32px !important;
                border: 1px solid rgba(59, 130, 246, 0.15) !important;
            }
        }
    </style>
</head>

            <script>
                function startLiveClock() {
                    const clockEl = document.getElementById('dashClock');
                    const timeEl = document.getElementById('clockTime');

                    function update() {
                        const now = new Date();

                        // Get saved offset from localStorage (default +7 for WIB)
                        const savedTz = parseInt(localStorage.getItem('nms_timezone') || '7');

                        // Calculate UTC time
                        const utc = now.getTime() + (now.getTimezoneOffset() * 60000);

                        // Apply selected offset
                        const tzTime = new Date(utc + (3600000 * savedTz));

                        const h = String(tzTime.getHours()).padStart(2, '0');
                        const m = String(tzTime.getMinutes()).padStart(2, '0');
                        const s = String(tzTime.getSeconds()).padStart(2, '0');

                        // Determine zone label
                        let zone = 'WIB';
                        if (savedTz === 8) zone = 'WITA';
                        if (savedTz === 9) zone = 'WIT';

                        timeEl.innerHTML = `${h}:${m}:${s} <small style="opacity:0.6; font-size:0.6em; margin-left:4px;">${zone}</small>`;
                    }

                    // Check preference
                    const showClock = localStorage.getItem('nms_show_clock') !== 'false';
                    if (showClock) {
                        clockEl.style.display = 'flex';
                        update();
                        if (window._nmsClockInterval) clearInterval(window._nmsClockInterval);
                        window._nmsClockInterval = setInterval(update, 1000);
                    } else {
                        clockEl.style.display = 'none';
                    }
                }
                // Call it after DOM load or within existing init
                document.addEventListener('DOMContentLoaded', startLiveClock);

                // Re-init when settings saved (Optional if using full page reload)
                window.addEventListener('storage', function (e) {
                    if (e.key === 'nms_show_clock' || e.key === 'nms_timezone') {
                        startLiveClock();
                    }
                });

                // --- CLOUD NOTIFICATION FETCH ---
                async function updateCloudNotification() {
                    try {
                        const resp = await fetch('/api/cloud/notification');
                        const data = await resp.json();
                        const container = document.getElementById('newsMarquee');
                        const content = document.getElementById('newsContent');
                        const mobileWrapper = document.getElementById('newsMobileWrapper');
                        const mobileContent = document.getElementById('newsContentMobile');

                        if (data.status === 'ok' && data.message && data.message.trim() !== "") {
                            // Update Desktop
                            content.innerText = data.message;
                            container.style.display = 'flex';

                            // Update Mobile
                            if (mobileContent && mobileWrapper) {
                                mobileContent.innerText = data.message;
                                mobileWrapper.style.display = 'block';
                            }

                            // Dynamic animation speed based on length
                            const speed = Math.max(20, data.message.length / 5);
                            content.style.animationDuration = speed + 's';
                            if (mobileContent) mobileContent.style.animationDuration = speed + 's';
                        } else {
                            container.style.display = 'none';
                            if (mobileWrapper) mobileWrapper.style.display = 'none';
                        }
                    } catch (e) {
                        console.error("Failed to fetch cloud notification:", e);
                    }
                }

                // Initial fetch and periodic refresh (15 mins)
                updateCloudNotification();
                setInterval(updateCloudNotification, 15 * 60 * 1000);
            </script>

        function haversineKm(a, b) {
            var toRad = x => x * Math.PI / 180;
            var R = 6371;
            var dLat = toRad(b[0] - a[0]);
            var dLon = toRad(b[1] - a[1]);
            var lat1 = toRad(a[0]);
            var lat2 = toRad(b[0]);
            var s = Math.sin(dLat / 2) * Math.sin(dLat / 2) + Math.sin(dLon / 2) * Math.sin(dLon / 2) * Math.cos(lat1) * Math.cos(lat2);
            var c = 2 * Math.atan2(Math.sqrt(s), Math.sqrt(1 - s));
            return R * c;
        }

        function calcCableKm(topology) {
            if (!topology) return 0;
            var byId = {};
            if (topology.server && topology.server.id) byId[topology.server.id] = topology.server;
            (topology.extra_routers || []).forEach(x => { if (x && x.id) byId[x.id] = x; });
            (topology.odps || []).forEach(x => { if (x && x.id) byId[x.id] = x; });
            (topology.clients || []).forEach(x => { if (x && x.id) byId[x.id] = x; });

            var total = 0;
            var addObj = function (obj) {
                if (!obj || !obj.coordinates) return;

                // Multi-Parent
                if (Array.isArray(obj.parent) && Array.isArray(obj.cable_path) && Array.isArray(obj.cable_path[0])) {

                    obj.parent.forEach((pid, idx) => {
                        var parent = byId[pid] || (pid === 'server_utama' ? topology.server : null);
                        if (!parent || !parent.coordinates) return;

                        var path = obj.cable_path[idx];
                        if (!path || !Array.isArray(path)) {
                            total += haversineKm(parent.coordinates, obj.coordinates);
                            return;
                        }

                        var pts = [parent.coordinates];
                        path.forEach(p => { if (Array.isArray(p) && p.length === 2) pts.push(p); });
                        pts.push(obj.coordinates);

                        for (var i = 1; i < pts.length; i++) {
                            total += haversineKm(pts[i - 1], pts[i]);
                        }
                    });
                    return;
                }

                // Single Parent
                var pid = obj.parent;
                if (!pid) return;
                var parent = byId[pid] || (pid === 'server_utama' ? topology.server : null);
                if (!parent || !parent.coordinates) return;

                var pts = [];
                pts.push(parent.coordinates);
                if (Array.isArray(obj.cable_path) && obj.cable_path.length > 0) {
                    var firstEl = obj.cable_path[0];
                    if (Array.isArray(firstEl) && Array.isArray(firstEl[0])) {
                        firstEl.forEach(p => { if (Array.isArray(p)) pts.push(p); });
                    } else {
                        obj.cable_path.forEach(p => { if (Array.isArray(p) && p.length === 2) pts.push(p); });
                    }
                }
                pts.push(obj.coordinates);

                for (var i = 1; i < pts.length; i++) {
                    total += haversineKm(pts[i - 1], pts[i]);
                }
            };

            (topology.extra_routers || []).forEach(addObj);
            (topology.odps || []).forEach(addObj);
            (topology.clients || []).forEach(addObj);
            return total;
        }

        function calcOdpCapacity(topology) {
            var odps = topology.odps || [];
            var clients = topology.clients || [];
            var serverCoords = (topology.server && topology.server.coordinates) ? topology.server.coordinates : null;

            var totalSlots = 0;
            var usedSlots = 0;
            var criticalList = [];

            odps.forEach(o => {
                if (!o || !o.id) return;
                var pc = o.port_config || {};
                var odpType = (o.odp_type || '').toLowerCase();

                var total = 0;
                if (odpType === 'real_olt') {
                    total = parseInt(pc.pon_count || 0, 10) || 0;
                } else if (odpType === 'olt') {
                    total = parseInt(pc.olt_count || 0, 10) || 0;
                } else if (odpType === 'jb') {
                    total = parseInt(pc.jb_core || 0, 10) || 0;
                } else {
                    total += parseInt(pc.lan || 0, 10) || 0;
                    total += parseInt(pc.fo_a || 0, 10) || 0;
                    total += parseInt(pc.fo_b || 0, 10) || 0;
                }

                if (total <= 0) return;
                totalSlots += total;

                var used = clients.filter(c => c && c.parent === o.id).length;
                var childOdps = odps.filter(child => child && child.parent === o.id).length;
                used += childOdps;

                if (o.input_port && o.input_port !== '') used += 1;

                var cappedUsed = Math.min(used, total);
                usedSlots += cappedUsed;

                var remaining = total - cappedUsed;
                if (remaining <= 1) {
                    var dist = 0;
                    if (serverCoords && o.coordinates) {
                        dist = haversineKm(serverCoords, o.coordinates);
                    }
                    criticalList.push({
                        name: o.name || o.id,
                        remaining: remaining,
                        dist: dist
                    });
                }
            });

            // Sort by distance (asc)
            criticalList.sort((a, b) => a.dist - b.dist);

            if (totalSlots <= 0) return { totalSlots: 0, usedSlots: 0, pct: 0, remaining: 0, critical: [] };
            var pct = Math.max(0, Math.min(100, Math.round((usedSlots / totalSlots) * 100)));
            return {
                totalSlots, usedSlots, pct,
                remaining: Math.max(0, totalSlots - usedSlots),
                critical: criticalList.slice(0, 5)
            };
        }

        function safeText(v) {
            if (v === undefined || v === null) return '';
            var s = String(v);
            return s.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;').replace(/'/g, '&#039;');
        }
        function normalizeWa(n) {
            var s = safeText(n).replace(/\D/g, '');
            if (!s) return '';
            if (s.startsWith('0')) return '62' + s.slice(1);
            return s;
        }
        function encodeCsvCell(v) {
            var s = safeText(v);
            if (s.includes('"')) s = s.replace(/"/g, '""');
            if (s.includes(',') || s.includes('\n') || s.includes('"')) return '"' + s + '"';
            return s;
        }

        // Auto-Count Cache
        var AUTO_COUNTS = {
            'MIKROTIK': 0, 'OLT': 0, 'ODP': 0, 'TIANG': 0,
            'CLIENT HTB/SWITCH': 0, 'CLIENT OLT': 0, 'ROUTER/ONT': 0, 'KABEL': 0
        };

        function byIdMap(topo) {
            var m = {};
            if (!topo) return m;
            if (topo.server) m[topo.server.id] = topo.server;
            (topo.extra_routers || []).forEach(x => { if (x && x.id) m[x.id] = x; });
            (topo.odps || []).forEach(x => { if (x && x.id) m[x.id] = x; });
            (topo.clients || []).forEach(x => { if (x && x.id) m[x.id] = x; });
            return m;
        }

        function updateAutoCounts(topo) {
            if (!topo) return;
            var clients = topo.clients || [];
            var odps = topo.odps || [];
            var byId = byIdMap(topo);

            AUTO_COUNTS['MIKROTIK'] = (topo.server ? 1 : 0) + (topo.extra_routers || []).length;
            AUTO_COUNTS['ODP'] = odps.length;
            AUTO_COUNTS['OLT'] = odps.filter(o => (o.odp_type || '').toLowerCase() === 'real_olt').length;
            AUTO_COUNTS['TIANG'] = odps.filter(o => (o.odp_type || '').toLowerCase() === 'olt').length;
            AUTO_COUNTS['ROUTER/ONT'] = clients.length;
            AUTO_COUNTS['KABEL'] = parseFloat(calcCableKm(topo).toFixed(1));

            var cHTB = 0;
            var cOLT = 0;

            var getClientTypeRecursive = function (node) {
                if (!node || !node.parent) return 'htb';
                var parent = byId[node.parent];
                if (!parent) return 'htb';
                if (parent.type === 'client') return 'htb'; // Client dari Client (Estafet) -> HTB

                var curr = parent;
                var visited = new Set();
                var depth = 0;
                while (curr && depth < 20) {
                    if (visited.has(curr.id)) break;
                    visited.add(curr.id);

                    var type = (curr.odp_type || '').toLowerCase();
                    if (type === 'htb') return 'htb'; // Jalur HTB
                    if (type === 'real_olt') return 'olt'; // Jalur OLT Pusat

                    var nextPid = curr.parent;
                    if (!nextPid) break;
                    var nextParent = byId[nextPid];
                    if (!nextParent) break;
                    if (nextParent.type === 'client') return 'htb'; // Estafet di tengah jalur
                    curr = nextParent;
                    depth++;
                }
                return 'htb';
            };

            clients.forEach(c => {
                if (getClientTypeRecursive(c) === 'olt') cOLT++;
                else cHTB++;
            });

            AUTO_COUNTS['CLIENT HTB/SWITCH'] = cHTB;
            AUTO_COUNTS['CLIENT OLT'] = cOLT;
        }

            var cableVal = getVal('KABEL', AUTO_COUNTS['KABEL']);

            // Segmented Donut Logic

            if (chart && total > 0) {
                var slices = [

                    { qty: counts.olt, color: '#10b981' }, // Green
                    { qty: counts.odp, color: '#8b5cf6' }, // Purple
                    { qty: counts.tiang, color: '#f59e0b' }, // Orange
                    { qty: counts.htb, color: '#06b6d4' }, // Cyan
                    { qty: counts.clOlt, color: '#10b981' }, // Emerald/Green
                    { qty: counts.ont, color: '#6366f1' }   // Indigo
                ];

                var current = 0;
                var grad = slices.map(s => {
                    var pct = (s.qty / total) * 100;
                    var start = current;
                    current += pct;
                    return `${s.color} ${start}% ${current}%`;
                }).join(', ');
                chart.style.background = `conic-gradient(${grad})`;
            } else if (chart) {
                chart.style.background = '#1e293b';
            }
        }



        // Sync Topologi
        function updateTopologyData(newTopo) {
            if (!APP.topology || !APP.topology.server) {
                APP.topology = newTopo;
                return;
            }
            if (!newTopo) return;

            if (newTopo.server) Object.assign(APP.topology.server, newTopo.server);

            function mergeArray(targetArr, sourceArr) {
                if (!sourceArr) return;
                var map = {};
                targetArr.forEach(item => { if (item.id) map[item.id] = item; });

                sourceArr.forEach(src => {
                    var dst = map[src.id];
                    if (dst) Object.assign(dst, src);
                    else targetArr.push(src);
                });
            }

            if (!APP.topology.clients) APP.topology.clients = [];
            mergeArray(APP.topology.clients, newTopo.clients || []);

            if (!APP.topology.odps) APP.topology.odps = [];
            mergeArray(APP.topology.odps, newTopo.odps || []);

            if (!APP.topology.extra_routers) APP.topology.extra_routers = [];
            mergeArray(APP.topology.extra_routers, newTopo.extra_routers || []);
        }

        (function init() {
            var pass = localStorage.getItem('nms_auth_session');
            if (pass) {
                // Security check: Verify role
                // This prevents guest users from seeing dashboard flash during API call
                fetch('/api/data?t=' + new Date().getTime(), { headers: getAuthHeaders() })
                    .then(r => {
                        if (r.status === 401) {
                            // Invalid token, show login
                            document.getElementById('login-overlay').style.display = 'flex';
                            localStorage.removeItem('nms_auth_session');
                            return null;
                        }
                        return r.json();
                    })
                    .then(d => {
                        if (!d) return;

                        // Check role BEFORE revealing dashboard
                        if (d.role === 'viewer' || d.role === 'tamu') {
                            // Redirect guest users immediately WITHOUT showing dashboard
                            window.location.replace('/maps');
                            return;
                        }

                        // Authorized admin/user → NOW safe to hide overlay and show dashboard
                        document.getElementById('login-overlay').style.display = 'none';
                        loadAll();
                    })
                    .catch(() => {
                        // Network error, show login
                        document.getElementById('login-overlay').style.display = 'flex';
                    });
            } else {
                // No auth token, show login
                document.getElementById('login-overlay').style.display = 'flex';
            }
            var _dashSyncTimer = null;
            function reinitDashSync(rate) {
                if (_dashSyncTimer) clearInterval(_dashSyncTimer);
                var r = parseInt(rate || 10);
                if (r < 3) r = 3;
                _dashSyncTimer = setInterval(loadAll, r * 1000);
            }

            // Initial timer (fallback)
            reinitDashSync(10);

            // Hook into loadDashboard to update timer whenever settings change
            var oldLoadDashboard = loadDashboard;
            loadDashboard = function () {
                oldLoadDashboard();
                if (APP.settings && APP.settings.refresh_rate) {
                    var newRate = parseInt(APP.settings.refresh_rate);
                    // Only re-init if rate changed to avoid flicker/reset
                    if (window._currentDashRate !== newRate) {
                        window._currentDashRate = newRate;

        function backupToTelegram() {
            var btn = event.target;
            // Handle icon click vs button click
            if (btn.tagName === 'I') btn = btn.parentElement;

            var oldText = btn.innerHTML;
            btn.innerHTML = `<i class="fas fa-spinner fa-spin"></i> ${t('msg_sending')}`;
            btn.disabled = true;

            var pass = localStorage.getItem('nms_auth_session');
            fetch('/api/backup/telegram', {
                method: 'POST',
                headers: { 'X-Auth-Token': pass }
            })
                .then(r => r.json())
                .then(d => {

        // AUTOMATION LOGIC
        function loadAutomationSettings() {
            var s = APP.settings.automation || {};
            var bk = s.backup || {};
            var tg = s.telegram || {};


            if (document.getElementById('bk-enabled')) document.getElementById('bk-enabled').checked = !!bk.enabled;
            if (document.getElementById('bk-time')) document.getElementById('bk-time').value = bk.schedule_time || '02:00';
            if (document.getElementById('bk-days')) document.getElementById('bk-days').value = bk.keep_days || 7;


            var files = bk.include_files || ['topology.db', 'settings.json', 'finance.json', 'config.json', 'license.key'];
            document.querySelectorAll('.bk-file').forEach(el => {
                el.checked = files.includes(el.value);
            });


            if (document.getElementById('tg-enabled')) document.getElementById('tg-enabled').checked = !!tg.enabled;
            if (document.getElementById('tg-token')) document.getElementById('tg-token').value = tg.bot_token || '';
            if (document.getElementById('tg-chatid')) document.getElementById('tg-chatid').value = tg.chat_id || '';

            var notif = tg.notifications || {};
            if (document.getElementById('nt-offline')) document.getElementById('nt-offline').checked = !!notif.offline;
            if (document.getElementById('nt-online')) document.getElementById('nt-online').checked = !!notif.online;
            if (document.getElementById('nt-backup')) document.getElementById('nt-backup').checked = !!notif.backup_report;
            if (document.getElementById('nt-startup')) document.getElementById('nt-startup').checked = !!notif.startup_report;


            loadBackupHistory();
        }

        function loadBackupHistory() {
            var list = document.getElementById('bk-list');
            if (!list) return;

            list.innerHTML = '<div class="muted">Loading...</div>';

            fetch('/api/backup/list', { headers: getAuthHeaders() })
                .then(r => r.json())
                .then(d => {
                    list.innerHTML = '';
                    if (!d.files || d.files.length === 0) {
                        list.innerHTML = `<div class="muted" style="padding:10px;">${t('msg_no_backup_files')}</div>`;
                        return;
                    }
                    d.files.forEach(f => {
                        var div = document.createElement('div');
                        div.className = 'backup-item';

                        div.innerHTML = `
                        <div>
                            <div class="backup-name">${f.name}</div>
                            <div class="backup-sub">${f.date} &bull; ${f.size}</div>
                        </div>
                        <a href="/api/backup/download/${f.name}" target="_blank" class="btn-xs btn-accent no-underline">
                            <i class="fas fa-download"></i> <span data-lang="btn_download">UNDUH</span>
                        </a>
                    `;
                        list.appendChild(div);
                    });
                }).catch(e => {
                    list.innerHTML = `<div class="muted">${t('msg_fail_load_list')}</div>`;
                });
        }


        function saveAutomationSettings() {
            var files = [];
            document.querySelectorAll('.bk-file:checked').forEach(el => files.push(el.value));

            var payload = {
                automation: {
                    backup: {
                        enabled: document.getElementById('bk-enabled').checked,
                        schedule_time: document.getElementById('bk-time').value,
                        keep_days: parseInt(document.getElementById('bk-days').value) || 7,
                        include_files: files
                    },
                    telegram: {
                        enabled: document.getElementById('tg-enabled').checked,
                        bot_token: document.getElementById('tg-token').value.trim(),
                        chat_id: document.getElementById('tg-chatid').value.trim(),
                        notifications: {
                            offline: document.getElementById('nt-offline').checked,
                            online: document.getElementById('nt-online').checked,
                            backup_report: document.getElementById('nt-backup').checked,
                            startup_report: document.getElementById('nt-startup').checked,
                            daily_report: false // Disabled for now
                        }
                    }
                }
            };

            fetch('/api/settings', {
                method: 'POST',
                headers: Object.assign({ 'Content-Type': 'application/json' }, getAuthHeaders()),
                body: JSON.stringify(payload)
            }).then(r => r.json()).then(d => {
                if (d.settings) APP.settings = Object.assign(APP.settings || {}, d.settings);
                alert(t('alert_saved') || 'Saved');
                loadAutomationSettings();
            }).catch(e => alert("Error: " + e));
        }

    <script>
        function showToast(msg, type = 'success') {
            let container = document.getElementById('toast-container');
            if (!container) {
                container = document.createElement('div');
                container.id = 'toast-container';
                document.body.appendChild(container);
            }
            const toast = document.createElement('div');
            toast.className = `toast-msg ${type}`;
            const icon = type === 'success' ? 'check-circle' : (type === 'error' ? 'exclamation-circle' : 'info-circle');
            toast.innerHTML = `<i class="fas fa-${icon}"></i> <span>${msg}</span>`;
            container.appendChild(toast);
            setTimeout(() => {
                toast.classList.add('toast-fade-out');
                setTimeout(() => toast.remove(), 400);
            }, 3000);
        }

        // OTA Update Checker
        function checkUpdates() {
            var rb = document.getElementById('roleBadge');
            if (rb) rb.innerText = 'Checking Version...';


            fetch('/api/version')
                .then(r => r.json())
                .then(vData => {
                    const installedVer = vData.version || "3.1.0";


                    fetch('/api/update/check')
                        .then(r => r.json())
                        .then(data => {
                            const latestVer = data.new_version || installedVer;
                            if (rb) {
                                const isLatest = (installedVer === latestVer);
                                rb.className = 'muted role-badge ver-status ' + (isLatest ? 'ver-ok' : 'ver-update');
                                rb.innerHTML = `${t('lbl_ver_installed')} ${installedVer} / ${t('lbl_ver_latest')} ${latestVer}`;
                            }

                            if (data.update_available) {
                                var alertEl = document.getElementById('updateAlert');
                                if (alertEl) {
                                    alertEl.style.display = 'inline-flex';
                                    var txtEl = alertEl.querySelector('span');
                                    if (txtEl) txtEl.innerText = (t('msg_update_avail') || 'UPDATE TERSEDIA') + ' (v' + data.new_version + ')';
                                }
                            }
                        })
                        .catch(e => {
                            if (rb) rb.innerText = `${t('lbl_ver_installed')}: ${installedVer} (${t('msg_ver_offline')})`;
                        });
                })
                .catch(e => {
                    if (rb) rb.innerText = t('msg_ver_unknown');
                });
        }

            if (disp) disp.innerText = lang.toUpperCase();


            checkUpdates();


            var langSel = document.getElementById('langSelect');
            if (langSel) langSel.style.display = 'none';
        });

        let billingStatus = null;
        let cooldownTimer = null;

        function updateBillingHeartbeat() {
            fetch('/api/settings', { headers: getAuthHeaders() })
                .then(r => r.json())
                .then(d => {
                    const hbEl = document.getElementById('billing-heartbeat-text');
                    const cdBox = document.getElementById('billing-cooldown-box');

                    billingStatus = d.billing_status;

                    if (hbEl) {
                        if (billingStatus && billingStatus.enabled === false) {
                            hbEl.innerHTML = `<span style="color:#f87171">${t('lbl_disabled') || 'DISABLED'}</span>`;
                            if (cdBox) cdBox.style.display = 'none';
                        } else {
                            if (d.billing_heartbeat) hbEl.innerHTML = safeText(d.billing_heartbeat);
                            if (cdBox) cdBox.style.display = 'inline-flex';
                        }
                    }
                    startCountdown();
                }).catch(() => { });
        }

        function startCountdown() {
            if (cooldownTimer) clearInterval(cooldownTimer);
            if (!billingStatus || !billingStatus.enabled) return;

            const updateTimer = () => {
                const cdText = document.getElementById('billing-cooldown-text');
                if (!cdText) return;

                const nowLocal = Math.floor(Date.now() / 1000);
                const serverOffset = nowLocal - (billingStatus.server_time_ts || nowLocal);
                const nowSrv = nowLocal - serverOffset;

                const intervalSec = (billingStatus.interval_hours || 24) * 3600;
                const nextInterval = (billingStatus.last_check_ts || 0) + intervalSec;

                let nextWa = 0;
                try {
                    const [h, m] = billingStatus.wa_time.split(':').map(Number);
                    const d = new Date();
                    d.setHours(h, m, 0, 0);
                    if (d.getTime() / 1000 < nowSrv) d.setDate(d.getDate() + 1);
                    nextWa = Math.floor(d.getTime() / 1000);
                } catch (e) { }

                const nextRunTs = Math.min(nextInterval, nextWa || Infinity);
                const diff = nextRunTs - nowSrv;

                if (diff <= 0) {
                    cdText.innerText = "...";
                    return;
                }

                const hr = Math.floor(diff / 3600);
                const mn = Math.floor((diff % 3600) / 60);
                const sc = diff % 60;

                cdText.innerText = (hr > 0 ? hr + "h " : "") + (mn < 10 ? "0" + mn : mn) + "m" + (hr === 0 && mn < 5 ? ":" + (sc < 10 ? "0" + sc : sc) : "");
            };

            updateTimer();
            cooldownTimer = setInterval(updateTimer, 1000);
        }

        function runManualBillingPatrol() {
            var pass = localStorage.getItem('nms_auth_session');
            if (!pass) return;

            var conf = t('msg_patrol_conf') || "Mulai patroli billing sekarang?";
            if (!confirm(conf)) return;

            executePatrol();

            function executePatrol() {
                showToast("Patroli berjalan...", "info");
                fetch('/api/debug/run_billing', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json', 'X-Auth-Token': pass },
                    body: JSON.stringify({ force: true, notify_only: false })
                }).then(r => r.json()).then(res => {
                    if (res.status === 'ok') {
                        showToast(t('msg_billing_check_done') || "Check Done", "success");
                        loadLogs(); // [FIX] Refresh logs immediately
                    } else {
                        showToast(res.msg || "Error", "error");
                    }
                    updateBillingHeartbeat();
                }).catch(e => showToast("Patrol error: " + e, "error"));
            }
        }
