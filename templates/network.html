<head>

        (function () {
            var role = localStorage.getItem('nms_role');
            if (role === 'viewer') { window.location.href = "/"; }
        })();
    </script>
    <title></title>
    <script>
        try { var t = localStorage.getItem('nms_web_title'); if (t) document.title = t; } catch (e) { }


        function toggleSidebar() {
            document.querySelector('.sidebar').classList.toggle('active');
            document.querySelector('.overlay-bg').classList.toggle('active');
        }

    <link rel="shortcut icon" href="{{ url_for('static', filename='favicon.ico') }}">
    <link rel="stylesheet" href="/static/css/all.min.css"
        onerror="this.href='https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css'">
    <link rel="stylesheet" href="/static/css/dashboard.css">

    <style>
        .grid-2 {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 20px;
        }

        @media (max-width: 768px) {
            .grid-2 {
                grid-template-columns: 1fr;
            }
        }

        /* Loading Spinner */
        #page-loader {
            position: fixed;
            inset: 0;
            background: #0f172a;
            z-index: 9999;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            transition: opacity 0.5s ease;
        }

        .spinner {
            width: 50px;
            height: 50px;
            border: 5px solid rgba(56, 189, 248, 0.2);
            border-top: 5px solid #38bdf8;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin-bottom: 20px;
        }

        @keyframes spin {
            0% {
                transform: rotate(0deg);
            }

            100% {
                transform: rotate(360deg);
            }
        }

        .hidden-loader {
            opacity: 0;
            pointer-events: none;
        }

        /* Sorting Styles */
        .sortable {
            cursor: pointer;
            transition: background 0.2s;
            position: relative;
        }

        .sortable:hover {
            background: rgba(255, 255, 255, 0.05) !important;
        }

        .sort-icon {
            font-size: 10px;
            margin-left: 5px;
            opacity: 0.5;
        }

        .sort-icon.active {
            opacity: 1;
            color: #38bdf8;
        }

        /* Flexible Table Fix */
        .table-container {
            width: 100%;
            border-radius: 8px;
            overflow-x: auto;
            -webkit-overflow-scrolling: touch;
        }

        .table {
            width: 100%;
            border-collapse: collapse;
            min-width: 300px;
        }

        .table th,
        .table td {
            padding: 12px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
        }

        .input-xs {
            background: rgba(15, 23, 42, 0.6);
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: white;
            padding: 4px 8px;
            border-radius: 4px;
            width: 80px;
            text-align: center;
        }

        @media (max-width: 600px) {

            .table th,
            .table td {
                padding: 8px 6px;
                font-size: 11px;
            }

            .input-xs {
                width: 60px;
                padding: 4px;
                font-size: 11px;
            }

            .mobile-hide {
                display: none;
            }

            .sort-icon {
                margin-left: 2px;
            }
        }
    </style>
</head>

    <script>
        var APP = {
            topology: null,
            settings: null,
            mikrotik: {},
            page: 'inventory',
            infraTab: 'routers',
            invTab: 'installed',
            invSort: { key: 'name', dir: 'asc' },
            stockSort: { key: 'name', dir: 'asc' }
        };

        var AUTO_COUNTS = {
            'MIKROTIK': 0, 'OLT': 0, 'ODP': 0, 'TIANG': 0,
            'CLIENT HTB/SWITCH': 0, 'CLIENT OLT': 0, 'ROUTER/ONT': 0, 'KABEL': 0
        };

        function haversineKm(a, b) {
            var toRad = x => x * Math.PI / 180;
            var R = 6371;
            var dLat = toRad(b[0] - a[0]);
            var dLon = toRad(b[1] - a[1]);
            var lat1 = toRad(a[0]);
            var lat2 = toRad(b[0]);
            var s = Math.sin(dLat / 2) * Math.sin(dLat / 2) + Math.sin(dLon / 2) * Math.sin(dLon / 2) * Math.cos(lat1) * Math.cos(lat2);
            var c = 2 * Math.atan2(Math.sqrt(s), Math.sqrt(1 - s));
            return R * c;
        }

        function calcCableKm(topology) {
            if (!topology) return 0;
            var byId = byIdMap(topology);
            var total = 0;
            var addObj = function (obj) {
                if (!obj || !obj.coordinates || !obj.parent) return;
                var pid = obj.parent;
                if (Array.isArray(pid)) pid = pid[0];
                var parent = byId[pid];
                if (!parent || !parent.coordinates) return;

                var pts = [parent.coordinates];
                if (Array.isArray(obj.cable_path)) {
                    obj.cable_path.forEach(p => { if (Array.isArray(p) && p.length === 2) pts.push(p); });
                }
                pts.push(obj.coordinates);
                for (var i = 1; i < pts.length; i++) {
                    total += haversineKm(pts[i - 1], pts[i]);
                }
            };
            (topology.extra_routers || []).forEach(addObj);
            (topology.odps || []).forEach(addObj);
            (topology.clients || []).forEach(addObj);
            return total;
        }

        function calcOdpCapacity(topology) {
            var odps = topology.odps || [];
            var clients = topology.clients || [];
            var totalSlots = 0, usedSlots = 0;
            odps.forEach(o => {
                var pc = o.port_config || {}, type = (o.odp_type || '').toLowerCase();
                if (type === 'jb' || type === 'real_olt') return;
                var cap = (parseInt(pc.lan || 0) || 0) + (parseInt(pc.fo_a || 0) || 0) + (parseInt(pc.fo_b || 0) || 0);
                if (cap <= 0) return;
                totalSlots += cap;
                var used = clients.filter(c => c && c.parent === o.id).length;
                used += odps.filter(child => child && child.parent === o.id).length;
                if (o.input_port) used += 1;
                usedSlots += Math.min(used, cap);
            });
            return { totalSlots, usedSlots };
        }

        function updateAutoCounts(topo) {
            if (!topo) return;
            var clients = topo.clients || [];
            var odps = topo.odps || [];
            var byId = byIdMap(topo);

            AUTO_COUNTS['MIKROTIK'] = (topo.server ? 1 : 0) + (topo.extra_routers || []).length;
            AUTO_COUNTS['ODP'] = odps.length;
            AUTO_COUNTS['OLT'] = odps.filter(o => (o.odp_type || '').toLowerCase() === 'real_olt').length;
            AUTO_COUNTS['TIANG'] = odps.filter(o => (o.odp_type || '').toLowerCase() === 'olt').length;
            AUTO_COUNTS['ROUTER/ONT'] = clients.length;
            AUTO_COUNTS['KABEL'] = parseFloat(calcCableKm(topo).toFixed(1));
            AUTO_COUNTS['ODP PORT'] = calcOdpCapacity(topo).totalSlots;

            var cHTB = 0;
            var cOLT = 0;

            var getClientTypeRecursive = function (node) {
                if (!node || !node.parent) return 'htb';
                var parent = byId[node.parent];
                if (!parent) return 'htb';
                if (parent.type === 'client') return 'htb';
                var curr = parent;
                var visited = new Set();
                var depth = 0;
                while (curr && depth < 20) {
                    if (visited.has(curr.id)) break; visited.add(curr.id);
                    var type = (curr.odp_type || '').toLowerCase();
                    if (type === 'htb') return 'htb';
                    if (type === 'real_olt') return 'olt';
                    var nextPid = curr.parent;
                    if (!nextPid) break;
                    var nextParent = byId[nextPid];
                    if (!nextParent) break;
                    if (nextParent.type === 'client') return 'htb';
                    curr = nextParent; depth++;
                }
                return 'htb';
            };

            clients.forEach(c => {
                if (getClientTypeRecursive(c) === 'olt') cOLT++;
                else cHTB++;
            });

            AUTO_COUNTS['CLIENT HTB/SWITCH'] = cHTB;
            AUTO_COUNTS['CLIENT OLT'] = cOLT;
        }

        function getAuthHeaders() {
            return { 'X-Auth-Token': localStorage.getItem('nms_auth_session') || '' };
        }

        function safeText(v) {
            if (v === undefined || v === null) return '';
            var s = String(v);
            return s.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;').replace(/'/g, '&#039;');
        }

        function byIdMap(topo) {
            var m = {};
            if (!topo) return m;
            if (topo.server) {
                var sid = topo.server.id || 'server_utama';
                m[sid] = topo.server;

                m['server_utama'] = topo.server;
            }
            (topo.extra_routers || []).forEach(r => { if (r && r.id) m[r.id] = r; });
            (topo.odps || []).forEach(o => { if (o && o.id) m[o.id] = o; });
            (topo.clients || []).forEach(c => { if (c && c.id) m[c.id] = c; });
            return m;
        }

        function setPageTab(p) {
            APP.page = p;
            document.getElementById('pg-inventory').classList.toggle('hidden', p !== 'inventory');
            document.getElementById('pg-infra').classList.toggle('hidden', p !== 'infra');

            document.getElementById('sb-inv-link').classList.toggle('active', p === 'inventory');
            document.getElementById('sb-infra-link').classList.toggle('active', p === 'infra');

            var titleKey = (p === 'inventory') ? 'pg_inv_title' : 'pg_infra_title';
            var subKey = (p === 'inventory') ? 'pg_inv_subtitle' : 'pg_infra_subtitle';

            var elTitle = document.getElementById('pageTitleText');
            var elSub = document.getElementById('pageSubText');

            if (elTitle) {
                elTitle.setAttribute('data-lang', titleKey);
                elTitle.innerText = t(titleKey);
            }
            if (elSub) {
                elSub.setAttribute('data-lang', subKey);
                elSub.innerText = t(subKey);
            }

            var mobileTitle = (p === 'inventory') ? t('sb_inv') : t('sb_infra');
            document.getElementById('mobileBrandText').innerText = mobileTitle;

            if (p === 'infra') renderInfra();
            if (p === 'inventory') renderInventoryTable();
        }

        function setInfraTab(t) {
            APP.infraTab = t;
            document.getElementById('tabRouters').classList.toggle('active', t === 'routers');
            document.getElementById('tabOdps').classList.toggle('active', t === 'odps');
            renderInfra();
        }

        function renderInfra() {

            if (!APP.topology) { console.timeEnd("renderInfra"); return; }
            var topo = APP.topology;
            var mk = APP.mikrotik || {};
            var mkLoading = Object.keys(mk).length === 0;
            var q = safeText(document.getElementById('infraSearch') ? document.getElementById('infraSearch').value : '').trim().toLowerCase();


            var usageMap = {};
            (topo.clients || []).forEach(c => {
                if (c.parent) usageMap[c.parent] = (usageMap[c.parent] || 0) + 1;
            });
            (topo.odps || []).forEach(o => {
                if (o.parent) usageMap[o.parent] = (usageMap[o.parent] || 0) + 1;
            });

            var routers = [];
            if (topo.server) {
                var sId = topo.server.id || 'server_utama';
                var sName = topo.server.name || (t('lbl_main_server') === 'lbl_main_server' ? 'Server Utama' : t('lbl_main_server'));
                routers.push({ id: sId, name: sName, obj: topo.server, kind: 'server' });
            }
            (topo.extra_routers || []).forEach(r => routers.push({ id: r.id, name: r.name || r.id, obj: r, kind: 'router' }));

            var odps = topo.odps || [];
            document.getElementById('routerCount').innerText = routers.length;
            document.getElementById('odpCount').innerText = odps.length;

            var box = document.getElementById('infraCards');
            if (box) box.innerHTML = '';

            // Translations
            var txt_rx = t('lbl_rx') || "RX";
            var txt_tx = t('lbl_tx') || "TX";
            var txt_cpu = t('lbl_cpu') || "CPU";
            var txt_ping = t('lbl_ping') || "PING";
            var txt_uptime = t('lbl_uptime') || "Uptime";
            var txt_used = t('lbl_used') || "Terpakai";
            var txt_cap = t('lbl_cap') || "Kapasitas";
            var txt_perc = t('lbl_perc') || "Persen";
            var txt_rem = t('lbl_rem') || "Sisa";
            var txt_parent = t('lbl_parent') || "Induk";

            if (APP.infraTab === 'routers') {
                var list = routers;
                if (q) list = list.filter(x => {
                    var res = mk[x.id] || null;
                    var ok = res && !res.error;
                    var disp = ok ? safeText(res.identity || x.name) : safeText(x.name);
                    return disp.toLowerCase().includes(q);
                });

                var frag = document.createDocumentFragment();
                list.forEach(r => {
                    var rid = r.id;
                    var res = mk[rid] || (r.kind === 'server' ? mk['server_utama'] : null);
                    var ok = res && !res.error;

                    if (mkLoading || (mk && !res)) {
                        var elLatent = document.createElement('div');
                        elLatent.className = 'card-item';
                        elLatent.innerHTML = '<div class="card-head"><b>⏳ ' + safeText(r.name || r.id) + '</b></div>' +
                            '<div class="card-sub">' + t('msg_sync_data') + '</div>';
                        frag.appendChild(elLatent);
                        return;
                    }

                    var dispName = ok ? safeText(res.identity || r.name) : safeText(r.name);
                    var wanName = ok ? safeText(res.wan_name || '-') : '-';
                    var wanRx = ok ? safeText(res.wan_rx || '0') : '0';
                    var wanTx = ok ? safeText(res.wan_tx || '0') : '0';
                    var cpu = ok ? safeText(res.cpu || '0') + '%' : '-';
                    var up = ok ? safeText(res.uptime || '-') : '-';
                    var ping = ok ? safeText(res.ext_ping || '-') : '-';

                    var el = document.createElement('div');
                    el.className = 'card-item';
                    el.innerHTML = '' +
                        '<div class="card-head"><b>' + (ok ? '✅ ' : '❌ ') + dispName + '</b>' + (ok ? '<span class="pill green">' + t('lbl_online_pill') + '</span>' : '<span class="pill red">' + t('lbl_offline_pill') + '</span>') + '</div>' +
                        '<div class="card-sub">WAN: <b>' + wanName + '</b></div>' +
                        '<div class="kv">' +
                        '<div><div class="k">' + txt_rx + '</div><div class="v">' + wanRx + '</div></div>' +
                        '<div><div class="k">' + txt_tx + '</div><div class="v">' + wanTx + '</div></div>' +
                        '<div><div class="k">' + txt_cpu + '</div><div class="v">' + cpu + '</div></div>' +
                        '<div><div class="k">' + txt_ping + '</div><div class="v">' + ping + '</div></div>' +
                        '</div>' +
                        '<div class="card-sub" style="margin-top:10px">' + txt_uptime + ': <b>' + up + '</b></div>';
                    frag.appendChild(el);
                });
                if (box) box.appendChild(frag);
            } else {
                var byId = byIdMap(topo);
                var listOdp = odps.slice();
                if (q) listOdp = listOdp.filter(o => safeText(o.name || o.id).toLowerCase().includes(q));

                var frag = document.createDocumentFragment();
                listOdp.forEach(o => {
                    var parent = byId[o.parent] || null;
                    var parentName = parent ? (parent.name || parent.id) : (o.parent || '-');
                    if (parent && parent.id && mk[parent.id] && !mk[parent.id].error && mk[parent.id].identity) parentName = mk[parent.id].identity;
                    var type = safeText(o.odp_type || 'odp');

                    var cap = 0;
                    // ... (existing logic for cap/used omitted for brevity, assuming it's standard)
                    // Re-implementing simplified logic to ensure correctness
                    var pc = o.port_config || {};
                    if (type.toLowerCase() === 'jb') cap = parseInt(pc.jb_core || 0, 10) || 0;
                    else if (type.toLowerCase() === 'real_olt') cap = parseInt(pc.pon_count || 0, 10) || 0;
                    else if (type.toLowerCase() === 'olt') cap = parseInt(pc.olt_count || 0, 10) || 0;
                    else cap = (parseInt(pc.lan || 0, 10) || 0) + (parseInt(pc.fo_a || 0, 10) || 0) + (parseInt(pc.fo_b || 0, 10) || 0);

                    // OPTIMIZED USAGE COUNT (O(1))
                    var used = usageMap[o.id] || 0;
                    if (o.input_port && o.input_port !== '') used += 1;

                    var pct = cap > 0 ? Math.max(0, Math.min(100, Math.round((Math.min(used, cap) / cap) * 100))) : 0;

                    var el = document.createElement('div');
                    el.className = 'card-item';
                    el.innerHTML = '' +
                        '<div class="card-head"><b>📦 ' + safeText(o.name || o.id) + '</b><span class="pill">' + type.toUpperCase() + '</span></div>' +
                        '<div class="card-sub">' + txt_parent + ': <b>' + safeText(parentName) + '</b></div>' +
                        '<div class="kv">' +
                        '<div><div class="k">' + txt_used + '</div><div class="v">' + used + '</div></div>' +
                        '<div><div class="k">' + txt_cap + '</div><div class="v">' + cap + '</div></div>' +
                        '<div><div class="k">' + txt_perc + '</div><div class="v">' + pct + '%</div></div>' +
                        '<div><div class="k">' + txt_rem + '</div><div class="v">' + Math.max(0, cap - used) + '</div></div>' +
                        '</div>' +
                        '<div class="bar" style="margin-top:10px"><div style="width:' + pct + '%"></div></div>';
                    frag.appendChild(el);
                });
                if (box) box.appendChild(frag);
            }
            console.timeEnd("renderInfra");
        }

        function setInventoryTab(t) {
            APP.invTab = t;
            document.getElementById('tabInvInstalled').classList.toggle('active', t === 'installed');
            document.getElementById('tabInvStock').classList.toggle('active', t === 'stock');
            document.getElementById('invInstalledPane').classList.toggle('hidden', t !== 'installed');
            document.getElementById('invStockPane').classList.toggle('hidden', t !== 'stock');
            renderInventoryTable();
        }

        function renderInventoryTable(force) {
            if (!APP.settings) return;
            var tbody = document.getElementById('inventoryTbody');
            var stockTbody = document.getElementById('stockTbody');
            if (!tbody || !stockTbody) return;

            var autoKeys = ['MIKROTIK', 'OLT', 'ODP', 'ODP PORT', 'TIANG', 'CLIENT HTB/SWITCH', 'CLIENT OLT', 'ROUTER/ONT', 'KABEL'];

            // Deduplicate and Prepare list
            var finalInv = [];
            var seen = new Set();
            var origInv = APP.settings.inventory || [];

            // 1. Process Auto Keys first (Normalization match)
            autoKeys.forEach(k => {
                var kNorm = k.replace(/\s+/g, '').toUpperCase();
                var manualMatch = origInv.find(x => x && x.is_auto === false && (x.name || '').replace(/\s+/g, '').toUpperCase() === kNorm);

                if (manualMatch) {
                    finalInv.push(manualMatch);
                } else {
                    finalInv.push({ name: k, qty: AUTO_COUNTS[k] || 0, is_auto: true });
                }
                seen.add(kNorm);
            });

            // 2. Add remaining manual items
            origInv.forEach(x => {
                var nNorm = (x.name || '').replace(/\s+/g, '').toUpperCase();
                if (!seen.has(nNorm) && !x.hidden) {
                    finalInv.push(x);
                    seen.add(nNorm);
                }
            });

            // Sort
            var sI = APP.invSort;
            finalInv.sort((a, b) => {
                var valA = a[sI.key], valB = b[sI.key];
                if (typeof valA === 'string') { valA = valA.toLowerCase(); valB = valB.toLowerCase(); }
                if (valA < valB) return sI.dir === 'asc' ? -1 : 1;
                if (valA > valB) return sI.dir === 'asc' ? 1 : -1;
                return 0;
            });

            tbody.innerHTML = '';
            finalInv.forEach((item) => {
                var itemNorm = (item.name || '').replace(/\s+/g, '').toUpperCase();
                var isAutoKey = autoKeys.some(k => k.replace(/\s+/g, '').toUpperCase() === itemNorm);
                var isOverridden = isAutoKey && item.is_auto === false;

                var tr = document.createElement('tr');
                var actionHtml = '';

                if (isOverridden) {
                    actionHtml = `
                        <button class="btn-xs" style="background:#3b82f6; color:white; border:none;" 
                            title="${t('btn_reset_auto')}" onclick="resetInvItemByName('${safeText(item.name)}')">
                            <i class="fas fa-undo-alt"></i>
                        </button>`;
                } else if (isAutoKey) {
                    actionHtml = `<span class="muted">-</span>`;
                } else {
                    actionHtml = `<button class="btn-xs btn-danger" onclick="removeInvItemByName('${safeText(item.name)}')">
                            <i class="fas fa-trash"></i>
                        </button>`;
                }

                tr.innerHTML = '<td>' + safeText(item.name) + (item.is_auto ? ` <span class="pill" style="font-size:9px; padding:2px 6px; background:rgba(59,130,246,0.2); color:#38bdf8;">${t('lbl_auto')}</span>` : '') + '</td>' +
                    '<td><input type="number" class="input-xs" value="' + (item.qty || 0) + '" onchange="updateInvQtyByName(\'' + safeText(item.name) + '\', this.value)"></td>' +
                    '<td style="text-align:center; white-space:nowrap;">' + actionHtml + '</td>';
                tbody.appendChild(tr);
            });

            // Stock / Warehouse
            if (!APP.settings.inventory_stock) APP.settings.inventory_stock = [];
            var stock = JSON.parse(JSON.stringify(APP.settings.inventory_stock));


            var sS = APP.stockSort;
            stock.sort((a, b) => {
                var valA = a[sS.key], valB = b[sS.key];
                if (typeof valA === 'string') { valA = valA.toLowerCase(); valB = valB.toLowerCase(); }
                if (valA < valB) return sS.dir === 'asc' ? -1 : 1;
                if (valA > valB) return sS.dir === 'asc' ? 1 : -1;
                return 0;
            });

            stockTbody.innerHTML = '';
            stock.forEach((item, idx) => {
                var tr = document.createElement('tr');
                tr.innerHTML = '<td>' + safeText(item.name) + '</td>' +
                    '<td><input type="number" class="input-xs" value="' + (item.qty || 0) + '" onchange="updateStockQtyByName(\'' + safeText(item.name) + '\', this.value)"></td>' +
                    '<td style="text-align:center;"><button class="btn-xs btn-danger" onclick="removeStockItemByName(\'' + safeText(item.name) + '\')"><i class="fas fa-trash"></i></button></td>';
                stockTbody.appendChild(tr);
            });
            updateInvSortIcons();
        }

        function setInvSort(key) {
            if (APP.invSort.key === key) APP.invSort.dir = APP.invSort.dir === 'asc' ? 'desc' : 'asc';
            else { APP.invSort.key = key; APP.invSort.dir = 'asc'; }
            renderInventoryTable();
        }
        function setStockSort(key) {
            if (APP.stockSort.key === key) APP.stockSort.dir = APP.stockSort.dir === 'asc' ? 'desc' : 'asc';
            else { APP.stockSort.key = key; APP.stockSort.dir = 'asc'; }
            renderInventoryTable();
        }

        function updateInvSortIcons() {
            ['inv', 'stock'].forEach(type => {
                ['name', 'qty'].forEach(key => {
                    var el = document.getElementById(`sort-${type}-${key}`);
                    if (!el) return;
                    var sort = (type === 'inv') ? APP.invSort : APP.stockSort;
                    el.className = 'fas sort-icon';
                    if (sort.key === key) {
                        el.classList.add('active');
                        el.classList.add(sort.dir === 'asc' ? 'fa-sort-up' : 'fa-sort-down');
                    } else {
                        el.classList.add('fa-sort');
                    }
                });
            });
        }

        function updateInvQtyByName(name, val) {
            if (!APP.settings.inventory) APP.settings.inventory = [];
            var nNorm = name.replace(/\s+/g, '').toUpperCase();
            var idx = APP.settings.inventory.findIndex(x => (x.name || '').replace(/\s+/g, '').toUpperCase() === nNorm);

            if (idx !== -1) {
                APP.settings.inventory[idx].qty = parseFloat(val) || 0;
                APP.settings.inventory[idx].is_auto = false;
            } else {
                APP.settings.inventory.push({ name: name, qty: parseFloat(val) || 0, is_auto: false });
            }
            saveInventory(true);
        }
        function updateStockQtyByName(name, val) {
            var idx = APP.settings.inventory_stock.findIndex(x => x.name === name);
            if (idx !== -1) {
                APP.settings.inventory_stock[idx].qty = parseFloat(val) || 0;
                saveStock(true);
            }
        }

        function removeInvItemByName(name) {
            if (confirm(t('conf_del_item'))) {
                if (!APP.settings.inventory) APP.settings.inventory = [];
                var nNorm = name.replace(/\s+/g, '').toUpperCase();
                var idx = APP.settings.inventory.findIndex(x => (x.name || '').replace(/\s+/g, '').toUpperCase() === nNorm);
                var autoKeys = ['MIKROTIK', 'OLT', 'ODP', 'ODP PORT', 'TIANG', 'CLIENT HTB/SWITCH', 'CLIENT OLT', 'ROUTER/ONT', 'KABEL'];
                var isAuto = autoKeys.some(k => k.replace(/\s+/g, '').toUpperCase() === nNorm);

                if (idx !== -1) {
                    if (isAuto) {
                        APP.settings.inventory[idx].hidden = true;
                        APP.settings.inventory[idx].is_auto = false;
                    } else {
                        APP.settings.inventory.splice(idx, 1);
                    }
                } else if (isAuto) {
                    APP.settings.inventory.push({ name: name, qty: 0, hidden: true, is_auto: false });
                }
                renderInventoryTable();
                saveInventory(true);
            }
        }

        function resetInvItemByName(name) {
            var nNorm = name.replace(/\s+/g, '').toUpperCase();
            var idx = APP.settings.inventory.findIndex(x => (x.name || '').replace(/\s+/g, '').toUpperCase() === nNorm);
            if (idx !== -1) {
                APP.settings.inventory.splice(idx, 1);
                renderInventoryTable();
                saveInventory(true);
            }
        }
        function removeStockItemByName(name) {
            if (confirm(t('conf_del_stock'))) {
                var idx = APP.settings.inventory_stock.findIndex(x => x.name === name);
                if (idx !== -1) {
                    APP.settings.inventory_stock.splice(idx, 1);
                    renderInventoryTable();
                    saveStock(true);
                }
            }
        }

        function addInventoryItem() {
            if (!APP.settings) { alert(t('msg_set_not_loaded')); return; }
            var nameEl = document.getElementById('invNewName');
            var qtyEl = document.getElementById('invNewQty');
            var name = nameEl.value.trim();
            var qty = parseInt(qtyEl.value) || 1;
            if (!name) return;

            if (!APP.settings.inventory) APP.settings.inventory = [];
            APP.settings.inventory.push({ name: name, qty: qty });
            nameEl.value = '';
            qtyEl.value = '1';
            renderInventoryTable();
            saveInventory(true);
        }

        function addStockItem() {
            var name = document.getElementById('stockNewName').value.trim();
            var qty = parseInt(document.getElementById('stockNewQty').value) || 1;
            if (!name) return;
            if (!APP.settings.inventory_stock) APP.settings.inventory_stock = [];
            APP.settings.inventory_stock.push({ name: name, qty: qty });
            document.getElementById('stockNewName').value = '';
            renderInventoryTable();
            saveStock(true);
        }

        function saveInventory(silent) {
            var payload = { inventory: APP.settings.inventory };
            fetch('/api/settings', {
                method: 'POST',
                headers: Object.assign({ 'Content-Type': 'application/json' }, getAuthHeaders()),
                body: JSON.stringify(payload)
            }).then(r => r.json()).then(d => {
                if (d.status !== 'ok' && !silent) alert(t('alert_save_failed') + ': ' + (d.msg || 'Unknown error'));
                else if (!silent) alert(t('msg_saved_ok'));
            }).catch(e => {
                console.error(e);
                if (!silent) alert(t('msg_error') || 'Gagal menyimpan');
            });
        }

        function saveStock(silent) {
            var payload = { inventory_stock: APP.settings.inventory_stock };
            fetch('/api/settings', {
                method: 'POST',
                headers: Object.assign({ 'Content-Type': 'application/json' }, getAuthHeaders()),
                body: JSON.stringify(payload)
            }).then(r => r.json()).then(d => {
                if (d.status !== 'ok' && !silent) alert(t('alert_save_failed') + ': ' + (d.msg || 'Error'));
                else if (!silent) alert(t('msg_saved_ok'));
            }).catch(e => {
                console.error(e);
                if (!silent) alert(t('msg_error') || 'Gagal menyimpan');
            });
        }

        function syncSettings() {
            fetch('/api/settings', { headers: getAuthHeaders() })
                .then(r => r.json())
                .then(s => {
                    if (s) {
                        if (s.web_title) {
                            localStorage.setItem('nms_web_title', s.web_title);
                            document.querySelectorAll('.brand-text, #brandText, .mobile-brand').forEach(e => {
                                e.innerText = s.web_title;
                                e.removeAttribute('data-lang');
                            });
                            document.title = (t('sb_infra') || "NETWORK").toUpperCase() + " - " + s.web_title.toUpperCase();
                        }
                        if (s.is_licensed) {
                            localStorage.setItem('nms_is_licensed', 'true');
                            var b = document.getElementById('licBadge');
                            if (b) {
                                b.innerHTML = '<i class="fas fa-check-circle me-1"></i> LICENSED (PRO)';
                                b.style.background = 'rgba(16, 185, 129, 0.1)';
                                b.style.color = '#10b981';
                                b.style.borderColor = 'rgba(16, 185, 129, 0.2)';
                                b.href = '/license';
                                b.style.cursor = 'pointer';
                            }
                        } else {
                            localStorage.removeItem('nms_is_licensed');
                        }
                    }
                }).catch(() => { });
        }

        function loadData() {
            fetch('/api/data', { headers: getAuthHeaders() })
                .then(r => {
                    if (r.status === 401) { document.getElementById('login-overlay').style.display = 'flex'; return null; }
                    return r.json();
                })
                .then(d => {
                    if (!d) return;
                    APP.topology = d.topology;
                    APP.settings = d.settings;
                    APP.mikrotik = d.mikrotik_data || {};

                    updateAutoCounts(APP.topology);

                    if (APP.page === 'infra') renderInfra();
                    else renderInventoryTable(); // Default render

                    // Hide Loader
                    var loader = document.getElementById('page-loader');
                    if (loader) loader.classList.add('hidden-loader');
                }).catch(e => {
                    console.error("loadData error:", e);
                    var loader = document.getElementById('page-loader');
                    if (loader) loader.classList.add('hidden-loader');
                });
        }

        function doLogin() {
            var p = document.getElementById('passInput').value;
            fetch('/api/login', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ password: p })
            }).then(r => r.json()).then(d => {
                if (d.status === 'ok') {
                    localStorage.setItem('nms_auth_session', p);
                    location.reload();
                } else {
                    document.getElementById('loginMsg').style.display = 'block';
                }
            }).catch(e => alert(t('msg_conn_fail') || 'Connection Failed'));
        }

        function doLogout() {
            if (!confirm(t('conf_logout'))) return;
            localStorage.removeItem('nms_auth_session');
            location.reload();
        }




        document.addEventListener('DOMContentLoaded', () => {
            applyLanguage();
            syncSettings();
            var pass = localStorage.getItem('nms_auth_session');
            if (pass) {
                document.getElementById('login-overlay').style.display = 'none';
                loadData();
                setInterval(loadData, 10000);
            } else {
                document.getElementById('login-overlay').style.display = 'flex';
            }

            var params = new URLSearchParams(window.location.search);
            var tab = params.get('tab') || 'inventory';
            setPageTab(tab);
        });
    </script>
</body>
